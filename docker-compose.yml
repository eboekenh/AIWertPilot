services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: de_ai_kb
      POSTGRES_PASSWORD: de_ai_kb
      POSTGRES_DB: de_ai_kb
    ports:
      - "5432:5432"
    volumes:
      - de_ai_kb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_ai_kb -d de_ai_kb"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: de_ai_kb
      POSTGRES_PASSWORD: de_ai_kb
      POSTGRES_DB: de_ai_kb_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_ai_kb -d de_ai_kb_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["test"]

volumes:
  de_ai_kb_pgdata:
